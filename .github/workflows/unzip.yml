name: Unzip Src Folder
on:
  workflow_dispatch: # Is se hum button daba kar khud chala sakte hain
  push:
    paths:
      - '.github/workflows/unzip.yml'

jobs:
  unzip-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip src.zip
        run: |
          rm -rf src
          unzip src.zip
          rm src.zip

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Automated unzip of src.zip" || exit 0
          git push
